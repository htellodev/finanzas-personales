<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finanzas" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Finanzas Personales</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg:       #000000;
      --bg2:      #1C1C1E;
      --bg3:      #2C2C2E;
      --bg4:      #3A3A3C;
      --text:     #FFFFFF;
      --sub:      #8E8E93;
      --sep:      rgba(84,84,88,0.55);
      --accent:   #0A84FF;
      --green:    #30D158;
      --red:      #FF453A;
      --orange:   #FF9F0A;
      --purple:   #BF5AF2;
      --radius:   14px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh;
      padding-bottom: calc(70px + var(--safe-bot));
    }
    header {
      background: rgba(28,28,30,0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--sep);
      padding: calc(var(--safe-top) + 16px) 20px 16px;
      position: sticky; top: 0; z-index: 100;
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; }
    header p  { font-size: 12px; color: var(--sub); margin-top: 2px; }
    nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(28,28,30,0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--sep);
      display: flex; padding-bottom: var(--safe-bot); z-index: 100;
    }
    nav button {
      flex: 1; border: none; background: none;
      padding: 10px 2px 8px; font-size: 9px; color: var(--sub);
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: pointer; transition: color .2s;
    }
    nav button svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    nav button.active { color: var(--accent); font-weight: 600; }
    .page { display: none; padding: 16px; max-width: 680px; margin: 0 auto; }
    .page.active { display: block; }
    .card { background: var(--bg2); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
    .card-label { font-size: 11px; color: var(--sub); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .card-value { font-size: 26px; font-weight: 700; color: var(--accent); letter-spacing: -1px; }
    .card-sub   { font-size: 12px; color: var(--sub); margin-top: 4px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .grid-2 .card { margin-bottom: 0; }
    .grid-2 .card-value { font-size: 18px; }
    .grid-4 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .grid-4 .card { margin-bottom: 0; padding: 12px; }
    .grid-4 .card-value { font-size: 16px; }
    .section-title { font-size: 12px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: .7px; margin: 20px 0 8px; }
    .chart-wrap { position: relative; height: 220px; }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 10px; font-size: 11px; color: var(--sub); border-bottom: 1px solid var(--sep); white-space: nowrap; }
    td { padding: 10px; border-bottom: 1px solid var(--sep); white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg3); }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--sep); font-size: 14px; }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .label { color: var(--sub); }
    .detail-row .value { font-weight: 600; }
    .detail-row.total .label { color: var(--text); font-weight: 700; font-size: 15px; }
    .detail-row.total .value { color: var(--accent); font-weight: 700; font-size: 15px; }
    .loading { text-align: center; padding: 40px; color: var(--sub); font-size: 14px; }
    .dot { display: inline-block; animation: pulse 1.4s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .row-between { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .btn-small { flex-shrink: 0; border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-green  { background: var(--green);  color: white; }
    .btn-orange { background: var(--orange); color: white; }
    .btn-purple { background: var(--purple); color: white; }
    .btn-muted  { background: var(--bg3); color: var(--sub); border: 1.5px solid var(--bg4); }

    /* ── Filas de mes ── */
    .mes-row {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 0; border-bottom: 1px solid var(--sep);
    }
    .mes-row:last-child { border-bottom: none; }
    .mes-row-info { flex: 1; min-width: 0; }
    .mes-row-label { font-size: 15px; color: var(--text); }
    .mes-row-sub   { font-size: 11px; color: var(--sub); margin-top: 2px; }
    .mes-row-amount { font-size: 15px; font-weight: 700; flex-shrink: 0; text-align: right; }
    .mes-row-chevron { font-size: 11px; color: var(--sub); flex-shrink: 0; transition: transform .2s; }
    .mes-row-chevron.open { transform: rotate(180deg); }
    .expand-body { overflow: hidden; }
    .sub-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0 9px 14px; border-bottom: 1px solid var(--sep); font-size: 13px; }
    .sub-row:last-child { border-bottom: none; }
    .sub-row .slabel { color: var(--sub); }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: calc(80px + var(--safe-bot)); right: 20px;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--purple); color: white; border: none;
      font-size: 26px; font-weight: 300; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(191,90,242,.4); z-index: 99;
      transition: transform .15s;
    }
    .fab:active { transform: scale(.93); }

    /* ── Venta item ── */
    .venta-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--sep); cursor: pointer;
    }
    .venta-item:last-child { border-bottom: none; }
    .venta-fecha { font-size: 11px; color: var(--sub); min-width: 34px; }
    .venta-desc  { flex: 1; font-size: 14px; color: var(--text); }
    .venta-gc    { font-size: 10px; background: rgba(191,90,242,.18); color: var(--purple); border-radius: 99px; padding: 2px 7px; font-weight: 600; flex-shrink: 0; }
    .venta-monto { font-size: 14px; font-weight: 700; color: var(--purple); flex-shrink: 0; }
    .mes-header  { display: flex; justify-content: space-between; align-items: center; padding: 8px 0 4px; }
    .mes-header-title { font-size: 12px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: .5px; }
    .mes-header-total { font-size: 13px; font-weight: 700; color: var(--purple); }

    /* ── Modales ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.7); backdrop-filter: blur(6px);
      align-items: flex-end; justify-content: center;
    }
    .modal-box {
      background: var(--bg2); border-radius: 20px 20px 0 0;
      padding: 24px 20px calc(24px + var(--safe-bot));
      width: 100%; max-width: 480px;
    }
    .modal-handle { width: 36px; height: 4px; background: var(--bg4); border-radius: 99px; margin: 0 auto 20px; }
    .modal-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .modal-label  { font-size: 12px; color: var(--sub); margin-bottom: 6px; margin-top: 14px; display: block; text-transform: uppercase; letter-spacing: .5px; }
    .modal-label:first-of-type { margin-top: 0; }
    .modal-input  {
      width: 100%; background: var(--bg3); border: 1.5px solid var(--bg4);
      border-radius: 10px; padding: 12px 14px; font-size: 16px; font-weight: 600;
      color: var(--text); outline: none; -webkit-appearance: none;
    }
    .modal-input.big { font-size: 22px; text-align: right; }
    .modal-input:focus { border-color: var(--purple); }
    .modal-input.green:focus { border-color: var(--green); }
    .modal-input.orange:focus { border-color: var(--orange); }

    /* ── Checkbox ── */
    .check-row { display: flex; align-items: center; gap: 12px; margin-top: 16px; padding: 14px; background: var(--bg3); border-radius: 10px; cursor: pointer; }
    .check-row input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--purple); cursor: pointer; flex-shrink: 0; }
    .check-row label { font-size: 14px; color: var(--text); cursor: pointer; line-height: 1.3; }
    .check-row small { font-size: 11px; color: var(--sub); display: block; margin-top: 2px; }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions button { flex: 1; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-cancel       { background: var(--bg3); color: var(--sub); }
    .btn-confirm-green  { background: var(--green);  color: white; }
    .btn-confirm-orange { background: var(--orange); color: white; }
    .btn-confirm-purple { background: var(--purple); color: white; }
    .btn-danger       { background: var(--red); color: white; }
    .modal-actions-3  { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 20px; }
    .modal-actions-3 button { padding: 12px; border-radius: 12px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <h1>💰 Finanzas Personales</h1>
  <p id="header-sub">Cargando...</p>
</header>

<!-- ══ ESTE MES ══ -->
<div id="page-mes" class="page active">
  <div id="mes-content" class="loading">
    <span class="dot">●</span><span class="dot">●</span><span class="dot">●</span>
  </div>
</div>

<!-- ══ HISTÓRICO ══ -->
<div id="page-historico" class="page">
  <div id="hist-content" class="loading">
    <span class="dot">●</span><span class="dot">●</span><span class="dot">●</span>
  </div>
</div>

<!-- ══ GRÁFICOS ══ -->
<div id="page-graficos" class="page">
  <div id="graf-content" class="loading">
    <span class="dot">●</span><span class="dot">●</span><span class="dot">●</span>
  </div>
</div>

<!-- ══ VENTAS ══ -->
<div id="page-ventas" class="page">
  <div id="ventas-content" class="loading">
    <span class="dot">●</span><span class="dot">●</span><span class="dot">●</span>
  </div>
</div>
<button class="fab" id="fab-ventas" style="display:none" onclick="abrirModalVenta()">+</button>

<!-- ══ AJUSTES ══ -->
<div id="page-config" class="page">
  <div id="config-content" class="loading">
    <span class="dot">●</span><span class="dot">●</span><span class="dot">●</span>
  </div>
</div>
<button class="fab" id="fab-config" style="display:none;background:var(--bg4);box-shadow:0 4px 20px rgba(0,0,0,.4)" onclick="abrirModalPlantilla(null)">+</button>

<!-- ── Modal pensión ── -->
<div id="modal-pension" class="modal-overlay" onclick="if(event.target===this)cerrarModal('modal-pension')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <h2 id="pen-titulo">Registrar pensión</h2>
    <label class="modal-label">Monto recibido (CLP)</label>
    <input id="pen-monto" class="modal-input big green" type="text" inputmode="numeric" oninput="formatMiles(this)" />
    <input type="hidden" id="pen-periodo-val" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="cerrarModal('modal-pension')">Cancelar</button>
      <button id="pen-btn" class="btn-confirm-green" onclick="confirmarPension()">Confirmar</button>
    </div>
  </div>
</div>

<!-- ── Modal arriendo ── -->
<div id="modal-arriendo" class="modal-overlay" onclick="if(event.target===this)cerrarModal('modal-arriendo')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <h2 id="arr-titulo">Registrar arriendo</h2>
    <label class="modal-label">Departamento (CLP)</label>
    <input id="arr-depto" class="modal-input big orange" type="text" inputmode="numeric" oninput="formatMiles(this)" />
    <label class="modal-label">Estacionamiento (CLP)</label>
    <input id="arr-estac" class="modal-input orange" type="text" inputmode="numeric" oninput="formatMiles(this)" style="font-size:18px" />
    <input type="hidden" id="arr-periodo-val" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="cerrarModal('modal-arriendo')">Cancelar</button>
      <button id="arr-btn" class="btn-confirm-orange" onclick="confirmarArriendo()">Confirmar</button>
    </div>
  </div>
</div>

<!-- ── Modal venta ── -->
<div id="modal-venta" class="modal-overlay" onclick="if(event.target===this)cerrarModal('modal-venta')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <h2 id="v-titulo">Nueva venta</h2>
    <input type="hidden" id="v-id" />
    <label class="modal-label">Fecha</label>
    <input id="v-fecha" class="modal-input" type="date" />
    <label class="modal-label">Monto (CLP)</label>
    <input id="v-monto" class="modal-input big" type="text" inputmode="numeric" oninput="formatMiles(this)" />
    <label class="modal-label">Descripción</label>
    <input id="v-desc" class="modal-input" type="text" placeholder="¿Qué vendiste?" maxlength="120" />
    <div class="check-row" onclick="document.getElementById('v-gc').click()">
      <input type="checkbox" id="v-gc" onclick="event.stopPropagation()" />
      <label for="v-gc">
        Tributa al Global Complementario
        <small>Marca si debes declarar este ingreso en renta</small>
      </label>
    </div>
    <div class="modal-actions-3">
      <button class="btn-cancel" onclick="cerrarModal('modal-venta')">Cancelar</button>
      <button id="v-del-btn" class="btn-danger" onclick="eliminarVenta()" style="display:none">Eliminar</button>
      <button id="v-btn" class="btn-confirm-purple" onclick="guardarVenta()" style="grid-column: span 2">Guardar</button>
    </div>
  </div>
</div>

<!-- ── Modal plantilla ── -->
<div id="modal-plantilla" class="modal-overlay" onclick="if(event.target===this)cerrarModal('modal-plantilla')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <h2 id="plt-titulo">Nuevo ítem fijo</h2>
    <input type="hidden" id="plt-id" />
    <label class="modal-label">Nombre</label>
    <input id="plt-nombre" class="modal-input" type="text" placeholder="Ej: Netflix, Agua, Hipotecario…" maxlength="80" />
    <label class="modal-label">Categoría</label>
    <select id="plt-cat" class="modal-input" style="font-size:15px" onchange="toggleNuevaCat('plt')">
      <option value="cuenta_basica">Cuentas básicas</option>
      <option value="hipotecario">Crédito hipotecario</option>
      <option value="gastos_comunes">Gastos comunes</option>
      <option value="seguro">Seguros</option>
      <option value="transporte">Transporte</option>
      <option value="tarjeta_credito">Tarjetas de crédito</option>
      <option value="suscripcion">Suscripciones</option>
      <option value="donacion">Donaciones</option>
      <option value="ahorro">Ahorro</option>
      <option value="inversion">Inversiones</option>
      <option value="__nueva__">➕ Nueva categoría…</option>
    </select>
    <input id="plt-cat-nueva" class="modal-input" type="text" placeholder="Nombre de la nueva categoría" style="display:none;margin-top:8px" maxlength="40" />
    <div class="check-row" style="margin-top:14px" onclick="document.getElementById('plt-activo').click()">
      <input type="checkbox" id="plt-activo" onclick="event.stopPropagation()" />
      <label for="plt-activo">Activo <small>Se importa cada mes</small></label>
    </div>
    <div class="modal-actions-3">
      <button class="btn-cancel" onclick="cerrarModal('modal-plantilla')">Cancelar</button>
      <button id="plt-del-btn" class="btn-danger" onclick="eliminarPlantilla()" style="display:none">Eliminar</button>
      <button id="plt-btn" class="btn-confirm-purple" onclick="guardarPlantilla()" style="grid-column:span 2">Guardar</button>
    </div>
  </div>
</div>

<!-- ── Modal egreso ── -->
<div id="modal-egreso" class="modal-overlay" onclick="if(event.target===this)cerrarModal('modal-egreso')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <h2 id="egr-titulo">Registrar egreso</h2>
    <input type="hidden" id="egr-id" />
    <input type="hidden" id="egr-periodo-val" />
    <label class="modal-label">Nombre</label>
    <input id="egr-nombre" class="modal-input" type="text" placeholder="Ej: Luz, Hipotecario…" maxlength="80" />
    <label class="modal-label">Categoría</label>
    <select id="egr-cat" class="modal-input" style="font-size:15px" onchange="toggleNuevaCat('egr')">
      <option value="cuenta_basica">Cuentas básicas</option>
      <option value="hipotecario">Crédito hipotecario</option>
      <option value="gastos_comunes">Gastos comunes</option>
      <option value="seguro">Seguros</option>
      <option value="transporte">Transporte</option>
      <option value="tarjeta_credito">Tarjetas de crédito</option>
      <option value="suscripcion">Suscripciones</option>
      <option value="donacion">Donaciones</option>
      <option value="ahorro">Ahorro</option>
      <option value="inversion">Inversiones</option>
      <option value="__nueva__">➕ Nueva categoría…</option>
    </select>
    <input id="egr-cat-nueva" class="modal-input" type="text" placeholder="Nombre de la nueva categoría" style="display:none;margin-top:8px" maxlength="40" />
    <label class="modal-label">Monto (CLP)</label>
    <input id="egr-monto" class="modal-input big" type="text" inputmode="numeric" oninput="formatMiles(this)" />
    <div class="check-row" onclick="document.getElementById('egr-pagado').click()">
      <input type="checkbox" id="egr-pagado" onclick="event.stopPropagation()" />
      <label for="egr-pagado">Pagado</label>
    </div>
    <div class="check-row" onclick="document.getElementById('egr-recurrente').click()">
      <input type="checkbox" id="egr-recurrente" onclick="event.stopPropagation()" />
      <label for="egr-recurrente">🔄 Incluir cada mes (recurrente)</label>
    </div>
    <div class="modal-actions-3">
      <button class="btn-cancel" onclick="cerrarModal('modal-egreso')">Cancelar</button>
      <button id="egr-del-btn" class="btn-danger" onclick="eliminarEgreso()" style="display:none">Eliminar</button>
      <button id="egr-btn" class="btn-confirm-purple" onclick="guardarEgreso()" style="grid-column:span 2">Guardar</button>
    </div>
  </div>
</div>

<!-- ── Modal liquidación PDF ── -->
<input type="file" id="pdf-input" accept="application/pdf" style="display:none" onchange="procesarPDF(this)" />
<div id="modal-liquidacion" class="modal-overlay" onclick="if(event.target===this)cerrarModal('modal-liquidacion')">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <h2>Confirmar liquidación</h2>
    <div id="liq-preview" style="margin:8px 0 4px"></div>
    <div id="liq-error" style="color:var(--red);font-size:13px;display:none"></div>
    <div class="modal-actions-3" style="margin-top:12px">
      <button class="btn-cancel" onclick="cerrarModal('modal-liquidacion')">Cancelar</button>
      <button id="liq-btn" class="btn-confirm" onclick="insertarLiquidacion()" style="grid-column:span 2">✓ Insertar</button>
    </div>
  </div>
</div>

<!-- ── Nav ── -->
<nav>
  <button class="active" onclick="goTo('mes',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Este mes
  </button>
  <button onclick="goTo('historico',this)">
    <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
    Histórico
  </button>
  <button onclick="goTo('graficos',this)">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Gráficos
  </button>
  <button onclick="goTo('ventas',this)">
    <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    Ingresos
  </button>
  <button onclick="goTo('config',this)">

async function fetchData() {
  try {
    const [rL,rP,rO,rV,rEP,rE] = await Promise.all([
      fetch(`${SB_URL}/rest/v1/liquidaciones?select=*&order=periodo.asc,tipo.asc`, {headers:HDR}),
      fetch(`${SB_URL}/rest/v1/pensiones?select=*&order=periodo.asc`, {headers:HDR}),
      fetch(`${SB_URL}/rest/v1/otros_ingresos?select=*&order=periodo.asc,tipo.asc`, {headers:HDR}),
      fetch(`${SB_URL}/rest/v1/ventas?select=*&order=fecha.desc`, {headers:HDR}),
      fetch(`${SB_URL}/rest/v1/egresos_plantilla?activo=eq.true&order=categoria.asc,nombre.asc`, {headers:HDR}),
      fetch(`${SB_URL}/rest/v1/egresos?select=*&order=periodo.desc,categoria.asc,nombre.asc`, {headers:HDR})
    ]);

    // Verificar que la respuesta sea exitosa antes de parsear
    if (!rL.ok) { const e=await rL.json(); throw new Error(e?.message || `HTTP ${rL.status}`); }

    const rawL=await rL.json(); allData          = Array.isArray(rawL)?rawL:[];
    const rawP=await rP.json(); pensionData      = Array.isArray(rawP)?rawP:[];
    const rawO=await rO.json(); otrosData        = Array.isArray(rawO)?rawO:[];
    const rawV=await rV.json(); ventasData       = Array.isArray(rawV)?rawV:[];
    const rawEP=await rEP.json(); egresosPlantilla = Array.isArray(rawEP)?rawEP:[];
    const rawE=await rE.json();   egresosData      = Array.isArray(rawE)?rawE:[];

    const last = allData.filter(r=>r.tipo==="regular").at(-1);
    document.getElementById("header-sub").textContent = last ? `Última liquidación: ${mesLargo(last.periodo)}` : "Sin datos";

    renderEsteMes();
    renderHistorico();
    renderGraficos();
    renderVentas();
    renderConfig();
  } catch(err) {
    console.error("fetchData error:", err);
    mostrarErrorConexion(err.message || "No se pudo conectar con Supabase. Verifica tu conexión e inténtalo de nuevo.");
  }
}

function toggleNuevaCat(prefix) {
  const sel   = document.getElementById(prefix+"-cat");
  const input = document.getElementById(prefix+"-cat-nueva");
  const esNueva = sel.value === "__nueva__";
  input.style.display = esNueva ? "block" : "none";
  if (esNueva) setTimeout(()=>input.focus(), 50);
}

function setCatModal(prefix, cat) {
  const sel   = document.getElementById(prefix+"-cat");
  const input = document.getElementById(prefix+"-cat-nueva");
  const predefinida = [...sel.options].some(o=>o.value===cat && o.value!=="__nueva__");
  if (predefinida) {
    sel.value = cat;
    input.style.display = "none";
  } else {
    sel.value = "__nueva__";
    input.value = cat;
    input.style.display = "block";
  }
}

function getCatModal(prefix) {
  const sel = document.getElementById(prefix+"-cat");
  if (sel.value === "__nueva__") {
    const v = document.getElementById(prefix+"-cat-nueva").value.trim();
    return v || null;
  }
  return sel.value;
}

async function importarFijos(btn) {
  const periodo = periodoHoy();
  btn.textContent="Importando…"; btn.disabled=true;

  // Buscar mes anterior para pre-rellenar montos
  const d = new Date(periodo+"T12:00:00");
  const periodoAnterior = new Date(d.getFullYear(), d.getMonth()-1, 1).toISOString().split("T")[0];
  const rPrev = await fetch(`${SB_URL}/rest/v1/egresos?periodo=eq.${periodoAnterior}&select=nombre,monto`, {headers:HDR});
  const prevEgresos = rPrev.ok ? await rPrev.json() : [];

  const items = egresosPlantilla.map(p => {
    const prev  = prevEgresos.find(e=>e.nombre===p.nombre);
    const monto = prev ? prev.monto : (p.monto_base || 0);
    return {periodo, nombre:p.nombre, categoria:p.categoria, monto, pagado:false, plantilla_id:p.id};
  });

  const res = await fetch(`${SB_URL}/rest/v1/egresos`, {
    method:"POST",
    headers:{...HDR,"Content-Type":"application/json","Prefer":"return=minimal"},
    body:JSON.stringify(items)
  });
  btn.textContent="↓ Importar fijos del mes"; btn.disabled=false;
  if(res.ok||res.status===201||res.status===204) await fetchData();
  else alert("Error al importar.");
}

async function guardarEgreso() {
  const id         = document.getElementById("egr-id").value;
  const periodo    = document.getElementById("egr-periodo-val").value;
  const nombre     = document.getElementById("egr-nombre").value.trim();
  const cat        = getCatModal("egr");
  if (!cat) { alert("Ingresa el nombre de la nueva categoría"); return; }
  const monto      = parseMiles(document.getElementById("egr-monto"));
  const pagado     = document.getElementById("egr-pagado").checked;
  const recurrente = document.getElementById("egr-recurrente").checked;
  if (!nombre) { alert("Ingresa un nombre"); return; }
  const btn=document.getElementById("egr-btn");
  btn.textContent="Guardando…"; btn.disabled=true;

  // Manejar plantilla recurrente
  let plantilla_id = document.getElementById("egr-id").dataset.plantillaId || null;
  if (recurrente) {
    const existente = egresosPlantilla.find(p=>p.nombre.toLowerCase()===nombre.toLowerCase());
    if (existente) {
      plantilla_id = existente.id;
      await fetch(`${SB_URL}/rest/v1/egresos_plantilla?id=eq.${plantilla_id}`,
        {method:"PATCH", headers:{...HDR,"Content-Type":"application/json"}, body:JSON.stringify({activo:true, categoria:cat})});
    } else {
      const rP = await fetch(`${SB_URL}/rest/v1/egresos_plantilla`,
        {method:"POST", headers:{...HDR,"Content-Type":"application/json","Prefer":"return=representation"}, body:JSON.stringify({nombre, categoria:cat, activo:true, monto_base:monto})});
      if (rP.ok||rP.status===201) { const [p]=await rP.json(); plantilla_id=p.id; }
    }
  } else if (!recurrente && plantilla_id) {
    await fetch(`${SB_URL}/rest/v1/egresos_plantilla?id=eq.${plantilla_id}`,
      {method:"PATCH", headers:{...HDR,"Content-Type":"application/json"}, body:JSON.stringify({activo:false})});
  }

  const body = {nombre, categoria:cat, monto, pagado, ...(plantilla_id?{plantilla_id}:{plantilla_id:null})};
  const res = id
    ? await fetch(`${SB_URL}/rest/v1/egresos?id=eq.${id}`, {method:"PATCH", headers:{...HDR,"Content-Type":"application/json"}, body:JSON.stringify(body)})
    : await fetch(`${SB_URL}/rest/v1/egresos`, {method:"POST", headers:{...HDR,"Content-Type":"application/json","Prefer":"return=minimal"}, body:JSON.stringify({...body,periodo})});
  btn.textContent="Guardar"; btn.disabled=false;
  if(res.ok||res.status===201||res.status===204) { cerrarModal("modal-egreso"); await fetchData(); }
  else alert("Error al guardar.");
}

async function eliminarEgreso() {
  const id = document.getElementById("egr-id").value;
  if (!id||!confirm("¿Eliminar este egreso?")) return;
  await fetch(`${SB_URL}/rest/v1/egresos?id=eq.${id}`, {method:"DELETE", headers:HDR});
  cerrarModal("modal-egreso");
  await fetchData();
}

function toggleExpand(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById(id+"-chev");

  body.style.display = open ? "none" : "block";
  chev.classList.toggle("open", !open);
}

// ══ HISTÓRICO ═════════════════════════════════════════════
function renderHistorico() {
  const regulares = allData.filter(r=>r.tipo==="regular");

  const periodos = [...new Set([
    ...regulares.map(r=>r.periodo),
    ...pensionData.map(p=>p.periodo),
    ...otrosData.map(o=>o.periodo)
  ])].sort();

  const rows = periodos.map(p => {
    const s   = regulares.find(r=>r.periodo===p);
    const pen = pensionData.find(r=>r.periodo===p);
    const dep = otrosData.find(o=>o.periodo===p&&o.tipo==="arriendo_depto");
    const est = otrosData.find(o=>o.periodo===p&&o.tipo==="arriendo_estacionamiento");
    const arr = (dep?.monto??0)+(est?.monto??0);

    // Ventas del mes
    const inicio = p;
    const fin    = new Date(new Date(p).getFullYear(), new Date(p+"T12:00:00").getMonth()+1, 0).toISOString().split("T")[0];
    const ventas = ventasData.filter(v=>v.fecha>=inicio&&v.fecha<=fin).reduce((s,v)=>s+v.monto,0);

    const total = (s?.liquido_a_pagar??0)+(pen?.monto??0)+arr+ventas;
    return {periodo:p, sueldo:s?.liquido_a_pagar, pension:pen?.monto, arriendo:arr||null, ventas:ventas||null, total};
  });

  const totSueldo  = rows.reduce((s,r)=>s+(r.sueldo??0),0);
  const totPension = rows.reduce((s,r)=>s+(r.pension??0),0);
  const totArr     = rows.reduce((s,r)=>s+(r.arriendo??0),0);
  const totVentas  = rows.reduce((s,r)=>s+(r.ventas??0),0);
  const totTotal   = rows.reduce((s,r)=>s+r.total,0);

  document.getElementById("hist-content").innerHTML = `
    <div class="grid-2">
      <div class="card" style="margin-bottom:0">
        <div class="card-label">Sueldo 2026</div>
        <div class="card-value" style="font-size:17px">${clp(totSueldo)}</div>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="card-label">Pensión 2026</div>
        <div class="card-value" style="font-size:17px;color:var(--green)">${clp(totPension)}</div>
      </div>
    </div>
    <div class="grid-2" style="margin-top:10px">
      <div class="card" style="margin-bottom:0">
        <div class="card-label">Arriendo 2026</div>
        <div class="card-value" style="font-size:17px;color:var(--orange)">${clp(totArr)}</div>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="card-label">Ingresos varios 2026</div>
        <div class="card-value" style="font-size:17px;color:var(--purple)">${clp(totVentas)}</div>
      </div>
    </div>
    <div class="card" style="margin-top:10px;border-left:3px solid var(--accent)">
      <div class="card-label">Total ingresos 2026</div>
      <div class="card-value">${clp(totTotal)}</div>
    </div>

    <div class="section-title">Detalle por mes</div>
    <div class="card" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Período</th><th>Sueldo</th><th>Pensión</th><th>Arriendo</th><th>Ingresos</th><th>Total</th></tr></thead>
          <tbody>
            ${rows.map(r=>`<tr>
              <td>${mesLargo(r.periodo)}</td>
              <td>${r.sueldo!=null?clp(r.sueldo):`<span style="color:var(--sub)">—</span>`}</td>
              <td>${r.pension!=null?`<span class="pos">${clp(r.pension)}</span>`:`<span style="color:var(--orange)">Pend.</span>`}</td>
              <td>${r.arriendo?`<span style="color:var(--orange)">${clp(r.arriendo)}</span>`:`<span style="color:var(--orange)">Pend.</span>`}</td>
              <td>${r.ventas?`<span style="color:var(--purple)">${clp(r.ventas)}</span>`:`<span style="color:var(--sub)">—</span>`}</td>
              <td><strong>${clp(r.total)}</strong></td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderVentas() {
  if (ventasData.length===0) {
    document.getElementById("ventas-content").innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:var(--sub)">
        <div style="font-size:40px;margin-bottom:12px">🛍</div>
        <div style="font-size:16px;font-weight:600;color:var(--text)">Sin ingresos registrados</div>
        <div style="font-size:13px;margin-top:6px">Toca el + para agregar tu primer ingreso</div>
      </div>`;
    return;
  }

  // Agrupar por mes
  const grupos = {};
  ventasData.forEach(v => {
    const d   = new Date(v.fecha+"T12:00:00");
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    if (!grupos[key]) grupos[key] = [];
    grupos[key].push(v);
  });

  const totalGC = ventasData.filter(v=>v.tributa_gc).reduce((s,v)=>s+v.monto,0);
  const totalAll= ventasData.reduce((s,v)=>s+v.monto,0);

  let html = `
    <div class="grid-2">
      <div class="card" style="margin-bottom:0">
        <div class="card-label">Total registrado</div>
        <div class="card-value" style="font-size:20px;color:var(--purple)">${clp(totalAll)}</div>
        <div class="card-sub">${ventasData.length} venta${ventasData.length!==1?"s":""}</div>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="card-label">Tributa GC</div>
        <div class="card-value" style="font-size:20px;color:var(--orange)">${clp(totalGC)}</div>
        <div class="card-sub">a declarar en renta</div>
      </div>
    </div>
  `;

  Object.keys(grupos).sort().reverse().forEach(key => {
    const items = grupos[key];
    const totalMes = items.reduce((s,v)=>s+v.monto,0);
    const periodo  = key+"-01";
    html += `
      <div class="mes-header">
        <span class="mes-header-title">${mesLargo(periodo)}</span>
        <span class="mes-header-total">${clp(totalMes)}</span>
      </div>
      <div class="card" style="padding:4px 16px">
        ${items.map(v=>`
          <div class="venta-item" onclick="abrirModalVenta('${v.id}')">
            <span class="venta-fecha">${diaCorto(v.fecha)}</span>
            <span class="venta-desc">${v.descripcion||"Sin descripción"}</span>
            ${v.tributa_gc?`<span class="venta-gc">GC</span>`:""}
            <span class="venta-monto">${clp(v.monto)}</span>
          </div>
        `).join("")}
      </div>
    `;
  });

  document.getElementById("ventas-content").innerHTML = html;
}

    data:{labels:periodos.map(mes),datasets:[
      {label:"Sueldo",  data:periodos.map(p=>reg.find(r=>r.periodo===p)?.liquido_a_pagar??0),backgroundColor:"#0A84FF",borderRadius:4},
      {label:"Pensión", data:periodos.map(p=>pensionData.find(r=>r.periodo===p)?.monto??0),  backgroundColor:"#30D158",borderRadius:4},
      {label:"Arriendo",data:periodos.map(p=>{
        const d=otrosData.find(o=>o.periodo===p&&o.tipo==="arriendo_depto");
        const e=otrosData.find(o=>o.periodo===p&&o.tipo==="arriendo_estacionamiento");
        return (d?.monto??0)+(e?.monto??0);
      }),backgroundColor:"#FF9F0A",borderRadius:4},
      {label:"Ingresos",data:periodos.map(p=>{
        const fin=new Date(new Date(p).getFullYear(),new Date(p+"T12:00:00").getMonth()+1,0).toISOString().split("T")[0];
        return ventasData.filter(v=>v.fecha>=p&&v.fecha<=fin).reduce((s,v)=>s+v.monto,0);
      }),backgroundColor:"#BF5AF2",borderRadius:4},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:"bottom",labels:{font:{size:11},padding:10,color:"#FFF"}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${clp(c.raw)}`}}},
      scales:{x:{stacked:true,ticks:{font:{size:11},color:gc.color},grid:{display:false}},
              y:{stacked:true,ticks:{callback:v=>"$"+Math.round(v/1000)+"k",font:{size:10},color:gc.color},grid:{color:gc.grid}}}}
  });

  const last=reg.at(-1);
  if(last) new Chart(document.getElementById("c-donut"),{
    type:"doughnut",
    data:{labels:["Líquido","AFP + comisión","Isapre","Impuesto"],
      datasets:[{data:[last.liquido_a_pagar,last.afp_fondo_pension+last.comision_afp,last.isapre_legal+last.cot_adicional_isapre,last.impuesto_unico],
        backgroundColor:["#0A84FF","#FF453A","#FF9F0A","#FFD60A"],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:"62%",
      plugins:{legend:{position:"bottom",labels:{font:{size:11},padding:12,color:"#FFF"}},tooltip:{callbacks:{label:c=>`${c.label}: ${clp(c.raw)}`}}}}
  });

  new Chart(document.getElementById("c-desc"),{
    type:"bar",
    data:{labels:labReg,datasets:[
      {label:"AFP",     data:reg.map(r=>r.afp_fondo_pension+r.comision_afp),       backgroundColor:"#FF453A",borderRadius:4},
      {label:"Isapre",  data:reg.map(r=>r.isapre_legal+r.cot_adicional_isapre),     backgroundColor:"#FF9F0A",borderRadius:4},
      {label:"Impuesto",data:reg.map(r=>r.impuesto_unico),                          backgroundColor:"#FFD60A",borderRadius:4},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:"bottom",labels:{font:{size:11},padding:10,color:"#FFF"}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${clp(c.raw)}`}}},
      scales:{x:{stacked:true,ticks:{font:{size:11},color:gc.color},grid:{display:false}},
              y:{stacked:true,ticks:{callback:v=>"$"+Math.round(v/1000)+"k",font:{size:10},color:gc.color},grid:{color:gc.grid}}}}
  });
}

// ══ LIQUIDACIÓN PDF ═══════════════════════════════════════
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

let _liqDatos = null;

function parseNum(txt) {
  const limpio = txt.replace(/\s/g,"").replace(/\./g,"").replace(/,/g,"");
  return /^\d+$/.test(limpio) ? parseInt(limpio,10) : 0;
}

function findVal(texto, pattern, def="0") {
  const m = texto.match(pattern);
  return m ? m[1].trim() : def;
}

async function procesarPDF(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = "";

  document.getElementById("liq-preview").innerHTML = `<div class="loading" style="padding:20px"><span class="dot">●</span><span class="dot">●</span><span class="dot">●</span></div>`;
  document.getElementById("liq-error").style.display = "none";
  document.getElementById("modal-liquidacion").style.display = "flex";

  try {
    const ab   = await file.arrayBuffer();
    const pdf  = await pdfjsLib.getDocument({data: ab}).promise;
    let texto  = "";
    for (let i=1; i<=pdf.numPages; i++) {
      const page  = await pdf.getPage(i);
      const items = await page.getTextContent();
      texto += items.items.map(s=>s.str).join(" ") + "\n";
    }

    // Período
    const mPer = texto.match(/mes de (\w+) de (\d{4})/i);
    if (!mPer) throw new Error("No se encontró el período en el PDF. ¿Es una liquidación válida?");
    const MESES = {enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12};
    const mesNum = MESES[mPer[1].toLowerCase()];
    if (!mesNum) throw new Error(`Mes no reconocido: ${mPer[1]}`);
    const anio   = parseInt(mPer[2]);
    const periodo = `${anio}-${String(mesNum).padStart(2,"0")}-01`;

    // Tipo
    const tieneBonoDes = /Bono de Desempe[nñ]o/i.test(texto);
    const tieneSueldo  = /Sueldo Base/i.test(texto);
    const tipo = (tieneBonoDes && !tieneSueldo) ? "bono_desempeno" : "regular";

    // Haberes
    const sueldo_base         = parseNum(findVal(texto, /Sueldo Base\s+[\d,]+\s+([\d.]+)/));
    const gratificacion_legal = parseNum(findVal(texto, /Gratificacion Legal Mensu\s+([\d.]+)/));
    const ayuda_conexion      = parseNum(findVal(texto, /Ayuda Costos de Conexi[oó]n\s+([\d.]+)/));
    const bono_extraordinario = parseNum(findVal(texto, /Bono Extraordinario\s+([\d.]+)/));
    const bono_desempeno      = parseNum(findVal(texto, /Bono de Desempe[nñ]o\s+([\d.]+)/));

    // Bases
    const imponible  = parseNum(findVal(texto, /IMPONIBLE\s+([\d.]+)/));
    const tributable = parseNum(findVal(texto, /TRIBUTABLE\s+([\d.]+)/));

    // Descuentos legales
    const afp_fondo_pension = parseNum(findVal(texto, /Fondo Pens AFP Capital\s+[\d,]+\s+([\d.]+)/));
    const comision_afp      = parseNum(findVal(texto, /Comisi[oó]n AFP Capital\s+[\d,]+\s+([\d.]+)/));
    const isapre_legal      = parseNum(findVal(texto, /7% Legal Vida Tres\s+[\d,]+\s+([\d.]+)/));
    const impuesto_unico    = parseNum(findVal(texto, /Impuesto Unico Retenido\s+[\d,]+\s+([\d.]+)/));

    // Descuentos varios
    const desc_anticipo        = parseNum(findVal(texto, /Desc Ant Extraordinario\s+([\d.]+)/));
    const cot_adicional_isapre = parseNum(findVal(texto, /Cot Adicional Vida Tres\s+([\d.]+)/));

    // Totales calculados
    const total_haberes      = sueldo_base + gratificacion_legal + ayuda_conexion + bono_extraordinario + bono_desempeno;
    const total_desc_legales = afp_fondo_pension + comision_afp + isapre_legal + impuesto_unico;
    const total_desc_varios  = desc_anticipo + cot_adicional_isapre;
    const alcance_liquido    = total_haberes - total_desc_legales;
    const liquido_a_pagar    = alcance_liquido - total_desc_varios;

    // Tipo de cambio
    const mTC = texto.match(/Tipo de Cambio\s*:\s*(\d+)/);
    const tipo_cambio = mTC ? parseInt(mTC[1]) : 0;

    _liqDatos = {
      periodo, tipo, sueldo_base, gratificacion_legal, ayuda_conexion,
      bono_extraordinario, bono_desempeno, total_haberes, imponible, tributable,
      afp_fondo_pension, comision_afp, isapre_legal, impuesto_unico, total_desc_legales,
      desc_anticipo, cot_adicional_isapre, total_desc_varios,
      alcance_liquido, liquido_a_pagar, tipo_cambio, fuente_pdf: file.name
    };

    // Preview
    const rows = [
      ["Período", periodo.slice(0,7)],
      ["Tipo", tipo === "regular" ? "Regular" : "Bono de desempeño"],
      ["Sueldo base", clp(sueldo_base)],
      ["Total haberes", clp(total_haberes)],
      ["AFP + Isapre + Imp.", `-${clp(total_desc_legales)}`],
      ["Otros descuentos", total_desc_varios>0?`-${clp(total_desc_varios)}`:"—"],
      ["💰 Líquido a pagar", clp(liquido_a_pagar)],
    ].map(([k,v])=>`
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--sep)">
        <span style="font-size:13px;color:var(--sub)">${k}</span>
        <span style="font-size:13px;font-weight:600">${v}</span>
      </div>`).join("");

    document.getElementById("liq-preview").innerHTML = `<div style="margin-bottom:4px">${rows}</div>
      <div style="font-size:11px;color:var(--sub);margin-top:8px;text-align:center">${file.name}</div>`;

  } catch(err) {
    _liqDatos = null;
    document.getElementById("liq-preview").innerHTML = "";
    document.getElementById("liq-error").textContent = err.message;
    document.getElementById("liq-error").style.display = "block";
  }
}

async function insertarLiquidacion() {
  if (!_liqDatos) return;
  const btn = document.getElementById("liq-btn");
  btn.textContent = "Insertando…"; btn.disabled = true;
  const res = await fetch(`${SB_URL}/rest/v1/liquidaciones`, {
    method: "POST",
    headers: {...HDR, "Content-Type":"application/json", "Prefer":"resolution=merge-duplicates,return=minimal"},
    body: JSON.stringify(_liqDatos)
  });
  btn.textContent = "✓ Insertar"; btn.disabled = false;
  if (res.ok || res.status===201 || res.status===204) {
    cerrarModal("modal-liquidacion");
    _liqDatos = null;
    await fetchData();
  } else {
    document.getElementById("liq-error").textContent = `Error al insertar (HTTP ${res.status})`;
    document.getElementById("liq-error").style.display = "block";
  }
}

fetchData();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
